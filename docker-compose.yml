version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: itfreelance_php
    volumes:
      - ./:/var/www/html
    expose:
      - '9000'
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: itfreelance_nginx
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    container_name: itfreelance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: itfreelance
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '3307:3306'

volumes:
  mysql_data:
